add_newline = true
command_timeout = 200
format = """[$python$username$hostname$directory$git_branch$git_status]($style)
$character"""

[python]
format = '(\($virtualenv\) )($style)'
style  = 'bold fg:5'

[username]
format          = '[\[$user@]($style)'
style_user      = 'bold fg:9'
style_root      = 'bold fg:9'
show_always     = true
detect_env_vars = []

[hostname]
format   = '[$hostname\] ]($style)'
style    = 'bold fg:9'
disabled = false
ssh_only = false

[character]
error_symbol = "[✗](bold cyan)"
success_symbol = "[➜](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold fg:8"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
read_only_style = "bold fg:8"
style = "bold fg:2"

[git_branch]
format = "[$branch]($style) "
style = "italic cyan"

[git_status]
format     = '[$all_status]($style)'
style      = "cyan"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[time]
disabled    = false
format      = '[\[$time\] ]($style)'
time_format = '%H:%M'
style       = 'bold fg:15'
